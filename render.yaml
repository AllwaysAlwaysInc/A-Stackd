# Render Blueprint for the A Stack'd backend.
# In Render: New → Blueprint → select this repo → Apply.
# Provisions a web service + a managed Postgres and wires the env vars.
services:
  - type: web
    name: astackd-backend
    runtime: node
    plan: free
    autoDeploy: true
    buildCommand: npm ci && npm run build
    # Run migrations (idempotent) then boot the server.
    startCommand: node dist/store/migrate.js && node dist/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: astackd-db
          property: connectionString

databases:
  - name: astackd-db
    plan: free
    databaseName: astackd
